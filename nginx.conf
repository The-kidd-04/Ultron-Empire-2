events {
    worker_connections 1024;
}

http {
    upstream ultron_api {
        server api:8000;
    }

    server {
        listen 80;
        server_name api.ultron.pmssahihai.com;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name api.ultron.pmssahihai.com;

        ssl_certificate /etc/letsencrypt/live/api.ultron.pmssahihai.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.ultron.pmssahihai.com/privkey.pem;

        client_max_body_size 50M;

        location / {
            proxy_pass http://ultron_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /ws/ {
            proxy_pass http://ultron_api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 86400;
        }

        location /telegram/webhook {
            proxy_pass http://ultron_api/api/v1/webhooks/telegram;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /whatsapp/webhook {
            proxy_pass http://ultron_api/api/v1/webhooks/whatsapp;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
