<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Ultron — AI Wealth Analyst</title>
<meta name="description" content="Talk to Ultron — AI-powered wealth analyst by PMS Sahi Hai">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0a">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 48 48'><circle cx='24' cy='24' r='24' fill='%230a0a0a'/><text x='24' y='32' text-anchor='middle' fill='%2300ffc8' font-size='24' font-weight='bold'>U</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Inter',system-ui,sans-serif}
body{
  background:#0a0a0a;color:#fff;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
}

.container{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:2rem;width:100%;max-width:500px;
  position:relative;z-index:1;
}

/* Orb */
.orb-wrap{position:relative;width:260px;height:260px;margin-bottom:2.5rem}
@media(max-width:400px){.orb-wrap{width:200px;height:200px}}

.orb{
  width:100%;height:100%;border-radius:50%;
  background:conic-gradient(from 0deg,#1a0000,#cc0000,#ff3333,#880000,#cc0000,#330000,#ff1111,#990000,#1a0000);
  animation:spin 8s linear infinite;
  box-shadow:0 0 80px rgba(200,0,0,0.2),inset 0 0 80px rgba(0,0,0,0.7);
  position:relative;
}
.orb::after{
  content:'';position:absolute;inset:10%;border-radius:50%;
  background:radial-gradient(circle at 30% 30%,rgba(255,255,255,0.15),rgba(0,0,0,0.6) 60%);
}
.orb::before{
  content:'';position:absolute;inset:0;border-radius:50%;
  background:radial-gradient(circle at 60% 70%,rgba(255,50,50,0.3),transparent 50%);
}
@keyframes spin{to{transform:rotate(360deg)}}

/* Pulse rings on active */
.orb-wrap.active .pulse{
  position:absolute;inset:-8%;border-radius:50%;
  border:1px solid rgba(255,50,50,0.4);
  animation:pulse 2s ease-out infinite;
}
.orb-wrap.active .pulse:nth-child(2){animation-delay:0.5s}
.orb-wrap.active .pulse:nth-child(3){animation-delay:1s}
@keyframes pulse{0%{transform:scale(0.85);opacity:0.6}100%{transform:scale(1.3);opacity:0}}

/* Call button */
.call-btn{
  position:absolute;bottom:-12px;left:50%;transform:translateX(-50%);
  width:48px;height:48px;border-radius:50%;
  background:#fff;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 20px rgba(0,0,0,0.3);
  transition:all 0.3s;z-index:2;
}
.call-btn:hover{transform:translateX(-50%) scale(1.1)}
.call-btn.active{background:#dc2626;box-shadow:0 4px 20px rgba(220,38,38,0.4)}
.call-btn.active svg{stroke:#fff}
.call-btn svg{width:22px;height:22px;stroke:#111;stroke-width:2;fill:none}

/* Text */
.welcome{font-size:1.25rem;font-weight:500;margin-bottom:0.5rem;letter-spacing:-0.3px}
.powered{font-size:0.75rem;color:rgba(255,255,255,0.35)}
.powered a{color:rgba(255,255,255,0.5);text-decoration:none}
.status{font-size:0.8rem;color:rgba(255,255,255,0.4);margin-top:1.5rem;min-height:1.2em}
.status.live{color:#4ade80}

/* Chat toggle */
.chat-btn{
  position:fixed;top:1.2rem;right:1.2rem;
  width:36px;height:36px;border-radius:8px;
  background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:rgba(255,255,255,0.4);font-size:1rem;
  transition:background 0.2s;z-index:10;
}
.chat-btn:hover{background:rgba(255,255,255,0.1)}

/* Settings icon */
.settings-btn{
  position:fixed;top:1.2rem;right:3.5rem;
  width:36px;height:36px;border-radius:8px;
  background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:rgba(255,255,255,0.4);font-size:0.9rem;
  transition:background 0.2s;z-index:10;display:none;
}

/* Transcript */
.transcript{
  position:fixed;bottom:0;left:0;right:0;
  max-height:50vh;overflow-y:auto;
  background:rgba(10,10,10,0.97);
  border-top:1px solid rgba(255,255,255,0.08);
  padding:1rem 1.5rem;font-size:0.85rem;line-height:1.6;
  display:none;z-index:5;
  backdrop-filter:blur(20px);
}
.transcript.show{display:block}
.t-agent{color:#ff6b6b}
.t-user{color:rgba(255,255,255,0.6)}

/* Bottom bar */
.bottom-bar{
  position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);
  display:flex;align-items:center;gap:1.5rem;
  padding:0.6rem 1.5rem;border-radius:100px;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.08);
  font-size:0.75rem;color:rgba(255,255,255,0.3);
  display:none;
}
.bottom-bar.show{display:flex}
.bottom-bar button{
  background:none;border:none;color:rgba(255,255,255,0.4);
  cursor:pointer;font-family:inherit;font-size:0.75rem;
  display:flex;align-items:center;gap:0.4rem;
}
.bottom-bar button:hover{color:#fff}

/* Subtle bg */
.bg{
  position:fixed;inset:0;z-index:0;
  background:radial-gradient(ellipse at 50% 40%,rgba(100,0,0,0.08),transparent 70%);
}
</style>
</head>
<body>

<div class="bg"></div>
<div class="chat-btn" onclick="toggleTranscript()">💬</div>

<div class="container">
  <div class="orb-wrap" id="orbWrap">
    <div class="pulse"></div>
    <div class="pulse"></div>
    <div class="pulse"></div>
    <div class="orb"></div>
    <button class="call-btn" id="callBtn" onclick="toggleCall()">
      <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
      </svg>
    </button>
  </div>

  <p class="welcome">Welcome to Ultron</p>
  <p class="powered">Powered by <a href="https://www.pmssahihai.com" target="_blank">PMS Sahi Hai</a></p>
  <p class="status" id="status"></p>
</div>

<div class="transcript" id="transcript"></div>

<elevenlabs-convai agent-id="agent_6901kngq94krfmmv3gj2as11q0mk" style="position:fixed;bottom:1rem;right:1rem;z-index:100;display:none" id="widget"></elevenlabs-convai>
<script src="https://unpkg.com/@elevenlabs/convai-widget-embed" async type="text/javascript"></script>

<script>
let active = false;
const orbWrap = document.getElementById('orbWrap');
const callBtn = document.getElementById('callBtn');
const status = document.getElementById('status');
const widget = document.getElementById('widget');
const transcript = document.getElementById('transcript');

function toggleCall() {
  if (!active) {
    active = true;
    orbWrap.classList.add('active');
    callBtn.classList.add('active');
    widget.style.display = 'block';
    status.textContent = 'Connected — speak or use the widget';
    status.className = 'status live';
  } else {
    active = false;
    orbWrap.classList.remove('active');
    callBtn.classList.remove('active');
    widget.style.display = 'none';
    status.textContent = 'Call ended';
    status.className = 'status';
    setTimeout(() => { if (!active) status.textContent = ''; }, 2000);
  }
}

function toggleTranscript() {
  transcript.classList.toggle('show');
}
</script>

</body>
</html>
