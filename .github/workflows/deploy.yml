name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        default: "production"
        type: choice
        options:
          - production
          - staging

jobs:
  ci-check:
    name: Wait for CI
    runs-on: ubuntu-latest
    steps:
      - name: Wait for CI pipeline to pass
        uses: lewagon/wait-on-check-action@v1.3.4
        with:
          ref: ${{ github.sha }}
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          check-name: "Docker Build Verification"
          wait-interval: 15
          allowed-conclusions: success

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: ci-check
    environment: ${{ github.event.inputs.environment || 'production' }}

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH || '/opt/ultron-empire' }}

            echo "Pulling latest changes..."
            git fetch origin main
            git reset --hard origin/main

            echo "Starting services..."
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            echo "Cleaning up old images..."
            docker image prune -f

            echo "Verifying deployment..."
            sleep 10
            curl -sf http://localhost:8000/health || (echo "Health check failed!" && exit 1)

            echo "Deployment complete."

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Deployment to ${{ github.event.inputs.environment || 'production' }} failed!"
