<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Talk to Ultron — AI Wealth Analyst</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#050508">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 48 48'><circle cx='24' cy='24' r='24' fill='%23050508'/><text x='24' y='32' text-anchor='middle' fill='%2300ffc8' font-size='24' font-weight='bold'>U</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Space Grotesk',system-ui,sans-serif}
body{
  background:#050508;color:#e8e8f0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
}

.bg{position:fixed;inset:0;z-index:0}
.bg-grid{
  position:fixed;inset:0;
  background-image:linear-gradient(rgba(0,255,200,0.03) 1px,transparent 1px),
                    linear-gradient(90deg,rgba(0,255,200,0.03) 1px,transparent 1px);
  background-size:60px 60px;
}
.bg-orb1{position:fixed;width:500px;height:500px;border-radius:50%;filter:blur(120px);
  background:rgba(0,255,200,0.08);top:-150px;left:-150px;animation:f1 20s ease-in-out infinite}
.bg-orb2{position:fixed;width:400px;height:400px;border-radius:50%;filter:blur(100px);
  background:rgba(123,92,255,0.08);bottom:-100px;right:-100px;animation:f2 25s ease-in-out infinite}
@keyframes f1{0%,100%{transform:translate(0,0)}50%{transform:translate(80px,60px)}}
@keyframes f2{0%,100%{transform:translate(0,0)}50%{transform:translate(-60px,-80px)}}

.container{
  position:relative;z-index:1;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:2rem;width:100%;max-width:500px;
}

.logo{
  width:44px;height:44px;border-radius:12px;
  background:linear-gradient(135deg,#00ffc8,#00d4ff);
  display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:20px;color:#050508;
  box-shadow:0 0 20px rgba(0,255,200,0.15);
  margin-bottom:2rem;
}

.orb-wrap{position:relative;width:240px;height:240px;margin-bottom:2rem}
@media(max-width:400px){.orb-wrap{width:180px;height:180px}}
.orb{
  width:100%;height:100%;border-radius:50%;
  background:conic-gradient(from 0deg,#050508,#00ffc8,#00d4ff,#7b5cff,#00ffc8,#050508);
  animation:spin 10s linear infinite;
  box-shadow:0 0 80px rgba(0,255,200,0.12),inset 0 0 80px rgba(5,5,8,0.8);
  position:relative;
}
.orb::after{
  content:'';position:absolute;inset:12%;border-radius:50%;
  background:radial-gradient(circle at 30% 30%,rgba(0,255,200,0.1),rgba(5,5,8,0.9) 60%);
}
@keyframes spin{to{transform:rotate(360deg)}}

.title{font-size:1.4rem;font-weight:600;margin-bottom:0.4rem;letter-spacing:-0.5px}
.subtitle{font-size:0.8rem;color:rgba(232,232,240,0.3);margin-bottom:1.5rem}
.subtitle a{color:rgba(0,255,200,0.6);text-decoration:none}

.hint{font-size:0.75rem;color:rgba(232,232,240,0.25);margin-top:1rem}

.footer{
  position:fixed;bottom:1.5rem;
  font-size:0.7rem;color:rgba(232,232,240,0.2);
  z-index:1;
}
</style>
</head>
<body>

<div class="bg">
  <div class="bg-grid"></div>
  <div class="bg-orb1"></div>
  <div class="bg-orb2"></div>
</div>

<div class="container">
  <div class="logo">U</div>

  <div class="orb-wrap">
    <div class="orb"></div>
  </div>

  <p class="title">Ultron Empire</p>
  <p class="subtitle">AI Wealth Analyst by <a href="https://www.pmssahihai.com" target="_blank">PMS Sahi Hai</a></p>

  <p class="hint">Click the widget below to start a voice or text conversation</p>
</div>

<div class="footer">Powered by PMS Sahi Hai</div>

</body>
</html>
