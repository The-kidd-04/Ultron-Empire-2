<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Talk to Ultron — AI Wealth Analyst</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#050508">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 48 48'><circle cx='24' cy='24' r='24' fill='%23050508'/><text x='24' y='32' text-anchor='middle' fill='%2300ffc8' font-size='24' font-weight='bold'>U</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Space Grotesk',system-ui,sans-serif}
body{
  background:#050508;color:#e8e8f0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
}

/* Background */
.bg{position:fixed;inset:0;z-index:0}
.bg-grid{
  position:fixed;inset:0;
  background-image:linear-gradient(rgba(0,255,200,0.03) 1px,transparent 1px),
                    linear-gradient(90deg,rgba(0,255,200,0.03) 1px,transparent 1px);
  background-size:60px 60px;
}
.bg-orb1{position:fixed;width:500px;height:500px;border-radius:50%;filter:blur(120px);
  background:rgba(0,255,200,0.08);top:-150px;left:-150px;animation:f1 20s ease-in-out infinite}
.bg-orb2{position:fixed;width:400px;height:400px;border-radius:50%;filter:blur(100px);
  background:rgba(123,92,255,0.08);bottom:-100px;right:-100px;animation:f2 25s ease-in-out infinite}
@keyframes f1{0%,100%{transform:translate(0,0)}50%{transform:translate(80px,60px)}}
@keyframes f2{0%,100%{transform:translate(0,0)}50%{transform:translate(-60px,-80px)}}

.container{
  position:relative;z-index:1;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:2rem;width:100%;max-width:500px;
}

/* Logo */
.logo{
  width:44px;height:44px;border-radius:12px;
  background:linear-gradient(135deg,#00ffc8,#00d4ff);
  display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:20px;color:#050508;
  box-shadow:0 0 20px rgba(0,255,200,0.15);
  margin-bottom:2rem;
}

/* Orb */
.orb-wrap{position:relative;width:240px;height:240px;margin-bottom:2rem}
@media(max-width:400px){.orb-wrap{width:180px;height:180px}}
.orb{
  width:100%;height:100%;border-radius:50%;
  background:conic-gradient(from 0deg,#050508,#00ffc8,#00d4ff,#7b5cff,#00ffc8,#050508);
  animation:spin 10s linear infinite;
  box-shadow:0 0 80px rgba(0,255,200,0.12),inset 0 0 80px rgba(5,5,8,0.8);
  position:relative;
}
.orb::after{
  content:'';position:absolute;inset:12%;border-radius:50%;
  background:radial-gradient(circle at 30% 30%,rgba(0,255,200,0.1),rgba(5,5,8,0.9) 60%);
}
@keyframes spin{to{transform:rotate(360deg)}}

/* Pulse */
.orb-wrap.active .pulse{
  position:absolute;inset:-10%;border-radius:50%;
  border:1px solid rgba(0,255,200,0.3);
  animation:pulse 2s ease-out infinite;
}
.orb-wrap.active .pulse:nth-child(2){animation-delay:0.6s}
.orb-wrap.active .pulse:nth-child(3){animation-delay:1.2s}
@keyframes pulse{0%{transform:scale(0.85);opacity:0.5}100%{transform:scale(1.35);opacity:0}}

/* Call button */
.call-btn{
  display:inline-flex;align-items:center;gap:10px;
  padding:14px 36px;border-radius:100px;
  background:transparent;border:1px solid #00ffc8;
  color:#00ffc8;font-family:inherit;font-size:15px;
  font-weight:600;letter-spacing:1px;text-transform:uppercase;
  cursor:pointer;transition:all 0.3s;
}
.call-btn:hover{background:#00ffc8;color:#050508;box-shadow:0 0 30px rgba(0,255,200,0.2)}
.call-btn.active{background:#dc2626;border-color:#dc2626;color:#fff;animation:cpulse 1.5s ease-in-out infinite}
.call-btn.active:hover{background:#b91c1c}
@keyframes cpulse{0%,100%{box-shadow:0 0 20px rgba(220,38,38,0.2)}50%{box-shadow:0 0 40px rgba(220,38,38,0.4)}}
.call-btn svg{width:20px;height:20px}

/* Status */
.status{font-size:13px;color:rgba(232,232,240,0.4);margin-top:1.5rem;min-height:1.5em}
.status.live{color:#00ffc8}
.status.connecting{color:#facc15}

/* Title */
.title{font-size:1.4rem;font-weight:600;margin-bottom:0.4rem;letter-spacing:-0.5px}
.subtitle{font-size:0.8rem;color:rgba(232,232,240,0.3);margin-bottom:2.5rem}
.subtitle a{color:rgba(0,255,200,0.6);text-decoration:none}

/* Volume indicator */
.volume-bar{
  display:flex;gap:3px;align-items:center;justify-content:center;
  height:30px;margin-top:1rem;opacity:0;transition:opacity 0.3s;
}
.volume-bar.show{opacity:1}
.volume-bar span{
  width:4px;background:#00ffc8;border-radius:2px;
  animation:none;transition:height 0.1s;
}

/* Footer */
.footer{
  position:fixed;bottom:1.5rem;
  font-size:0.7rem;color:rgba(232,232,240,0.2);
}
</style>
</head>
<body>

<div class="bg">
  <div class="bg-grid"></div>
  <div class="bg-orb1"></div>
  <div class="bg-orb2"></div>
</div>

<div class="container">
  <div class="logo">U</div>

  <div class="orb-wrap" id="orbWrap">
    <div class="pulse"></div>
    <div class="pulse"></div>
    <div class="pulse"></div>
    <div class="orb"></div>
  </div>

  <p class="title">Ultron Empire</p>
  <p class="subtitle">AI Wealth Analyst by <a href="https://www.pmssahihai.com" target="_blank">PMS Sahi Hai</a></p>

  <button class="call-btn" id="callBtn" onclick="toggleCall()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
    </svg>
    <span id="btnText">Call Ultron</span>
  </button>

  <p class="status" id="status"></p>

  <div class="volume-bar" id="volumeBar">
    <span style="height:8px"></span><span style="height:12px"></span><span style="height:16px"></span>
    <span style="height:20px"></span><span style="height:14px"></span><span style="height:10px"></span>
    <span style="height:18px"></span><span style="height:8px"></span>
  </div>
</div>

<div class="footer">Powered by PMS Sahi Hai &bull; pmssahihai.com</div>

<script src="https://cdn.jsdelivr.net/npm/@vapi-ai/web@latest/dist/vapi.min.js"></script>
<script>
const VAPI_PUBLIC_KEY = 'd9c0293b-6b42-4315-9293-0ea16b1981e0';
const ASSISTANT_ID = 'c9a96928-b30a-4ca0-9fbb-928124b66cd7';

let vapi = null;
let active = false;

const orbWrap = document.getElementById('orbWrap');
const callBtn = document.getElementById('callBtn');
const btnText = document.getElementById('btnText');
const status = document.getElementById('status');
const volumeBar = document.getElementById('volumeBar');

function initVapi() {
  if (vapi) return;
  vapi = new window.Vapi(VAPI_PUBLIC_KEY);

  vapi.on('call-start', () => {
    active = true;
    orbWrap.classList.add('active');
    callBtn.classList.add('active');
    btnText.textContent = 'End Call';
    status.textContent = 'Connected — speak now';
    status.className = 'status live';
    volumeBar.classList.add('show');
    animateVolume();
  });

  vapi.on('call-end', () => {
    active = false;
    orbWrap.classList.remove('active');
    callBtn.classList.remove('active');
    btnText.textContent = 'Call Ultron';
    status.textContent = 'Call ended';
    status.className = 'status';
    volumeBar.classList.remove('show');
    setTimeout(() => { if (!active) status.textContent = ''; }, 3000);
  });

  vapi.on('speech-start', () => {
    status.textContent = 'Ultron is speaking...';
    status.className = 'status live';
  });

  vapi.on('speech-end', () => {
    if (active) {
      status.textContent = 'Listening...';
      status.className = 'status live';
    }
  });

  vapi.on('error', (e) => {
    console.error('Vapi error:', e);
    status.textContent = 'Connection error. Try again.';
    status.className = 'status';
    active = false;
    orbWrap.classList.remove('active');
    callBtn.classList.remove('active');
    btnText.textContent = 'Call Ultron';
    volumeBar.classList.remove('show');
  });
}

async function toggleCall() {
  initVapi();

  if (!active) {
    status.textContent = 'Connecting...';
    status.className = 'status connecting';
    try {
      await vapi.start(ASSISTANT_ID);
    } catch (e) {
      console.error('Start failed:', e);
      status.textContent = 'Failed to connect. Check microphone permissions.';
      status.className = 'status';
    }
  } else {
    vapi.stop();
  }
}

function animateVolume() {
  const bars = volumeBar.querySelectorAll('span');
  function frame() {
    if (!active) return;
    bars.forEach(b => {
      const h = 4 + Math.random() * 24;
      b.style.height = h + 'px';
    });
    requestAnimationFrame(frame);
  }
  frame();
}
</script>

</body>
</html>
