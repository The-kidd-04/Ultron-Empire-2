version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - redis
      - postgres
    volumes:
      - ./knowledge_base:/app/knowledge_base
      - ./data:/app/data
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload

  telegram:
    build: ./telegram_bot
    env_file: .env
    depends_on:
      - backend
    command: python -m telegram_bot.bot

  worker:
    build: ./backend
    env_file: .env
    depends_on:
      - redis
      - postgres
    command: celery -A workers.celery_app worker --loglevel=info

  beat:
    build: ./backend
    env_file: .env
    depends_on:
      - redis
    command: celery -A workers.celery_app beat --loglevel=info

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ultron
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  chroma:
    image: chromadb/chroma:latest
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    env_file: .env
    command: npm run dev

volumes:
  postgres_data:
  chroma_data:
