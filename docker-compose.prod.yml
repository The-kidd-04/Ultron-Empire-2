version: '3.8'

services:
  api:
    build: ./backend
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - redis
      - chroma
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    command: >
      gunicorn backend.main:app
      -w 4
      -k uvicorn.workers.UvicornWorker
      --bind 0.0.0.0:8000
      --timeout 120

  telegram:
    build: ./telegram_bot
    env_file: .env
    depends_on:
      - api
    restart: always
    command: python -m telegram_bot.bot

  worker:
    build: ./backend
    env_file: .env
    depends_on:
      - redis
    restart: always
    command: celery -A workers.celery_app worker --loglevel=info --concurrency=4

  beat:
    build: ./backend
    env_file: .env
    depends_on:
      - redis
    restart: always
    command: celery -A workers.celery_app beat --loglevel=info

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"

  chroma:
    image: chromadb/chroma:latest
    restart: always
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - /etc/letsencrypt:/etc/letsencrypt
    depends_on:
      - api
    restart: always

volumes:
  chroma_data:
