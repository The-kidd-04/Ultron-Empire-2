<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Talk to Ultron — AI Wealth Analyst</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#050508">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 48 48'><circle cx='24' cy='24' r='24' fill='%23050508'/><text x='24' y='32' text-anchor='middle' fill='%2300ffc8' font-size='24' font-weight='bold'>U</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Space Grotesk',system-ui,sans-serif}
body{background:#050508;color:#e8e8f0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.bg{position:fixed;inset:0;z-index:0}
.bg-grid{position:fixed;inset:0;background-image:linear-gradient(rgba(0,255,200,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,255,200,0.03) 1px,transparent 1px);background-size:60px 60px}
.bg-orb1{position:fixed;width:500px;height:500px;border-radius:50%;filter:blur(120px);background:rgba(0,255,200,0.08);top:-150px;left:-150px;animation:f1 20s ease-in-out infinite}
.bg-orb2{position:fixed;width:400px;height:400px;border-radius:50%;filter:blur(100px);background:rgba(123,92,255,0.08);bottom:-100px;right:-100px;animation:f2 25s ease-in-out infinite}
@keyframes f1{0%,100%{transform:translate(0,0)}50%{transform:translate(80px,60px)}}
@keyframes f2{0%,100%{transform:translate(0,0)}50%{transform:translate(-60px,-80px)}}
.container{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:1.5rem;width:100%;max-width:500px}
.logo{width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,#00ffc8,#00d4ff);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:20px;color:#050508;box-shadow:0 0 20px rgba(0,255,200,0.15);margin-bottom:1.5rem}
.orb-wrap{position:relative;width:200px;height:200px;margin-bottom:1.5rem}
@media(max-width:400px){.orb-wrap{width:160px;height:160px}}
.orb{width:100%;height:100%;border-radius:50%;background:conic-gradient(from 0deg,#050508,#00ffc8,#00d4ff,#7b5cff,#00ffc8,#050508);animation:spin 10s linear infinite;box-shadow:0 0 80px rgba(0,255,200,0.12),inset 0 0 80px rgba(5,5,8,0.8);position:relative}
.orb::after{content:'';position:absolute;inset:12%;border-radius:50%;background:radial-gradient(circle at 30% 30%,rgba(0,255,200,0.1),rgba(5,5,8,0.9) 60%)}
@keyframes spin{to{transform:rotate(360deg)}}
.orb-wrap.active .pulse{position:absolute;inset:-10%;border-radius:50%;border:1px solid rgba(0,255,200,0.3);animation:pulse 2s ease-out infinite}
.orb-wrap.active .pulse:nth-child(2){animation-delay:0.6s}
.orb-wrap.active .pulse:nth-child(3){animation-delay:1.2s}
@keyframes pulse{0%{transform:scale(0.85);opacity:0.5}100%{transform:scale(1.35);opacity:0}}
.title{font-size:1.3rem;font-weight:600;margin-bottom:0.3rem;letter-spacing:-0.5px}
.subtitle{font-size:0.75rem;color:rgba(232,232,240,0.3);margin-bottom:1.5rem}
.subtitle a{color:rgba(0,255,200,0.6);text-decoration:none}
.call-btn{display:inline-flex;align-items:center;gap:10px;padding:14px 36px;border-radius:100px;background:#00ffc8;border:none;color:#050508;font-family:inherit;font-size:15px;font-weight:600;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:all 0.3s;box-shadow:0 0 30px rgba(0,255,200,0.2)}
.call-btn:hover{box-shadow:0 0 50px rgba(0,255,200,0.3);transform:scale(1.05)}
.call-btn.active{background:#dc2626;color:#fff;box-shadow:0 0 30px rgba(220,38,38,0.3)}
.call-btn svg{width:20px;height:20px}
.status{font-size:13px;color:rgba(232,232,240,0.4);margin-top:1rem;min-height:1.5em}
.status.live{color:#00ffc8}
.status.err{color:#f87171}

/* Subtitles */
.captions{
  position:fixed;bottom:0;left:0;right:0;
  padding:1.5rem 2rem 2rem;
  background:linear-gradient(transparent,rgba(5,5,8,0.95) 30%);
  z-index:10;display:none;
  max-height:40vh;overflow-y:auto;
}
.captions.show{display:block}
.captions-inner{max-width:500px;margin:0 auto}
.caption{
  padding:0.5rem 0;font-size:0.9rem;line-height:1.5;
  animation:fadeIn 0.3s ease;
}
.caption.agent{color:#00ffc8}
.caption.user{color:rgba(232,232,240,0.5);font-style:italic}
.caption .label{font-size:0.65rem;text-transform:uppercase;letter-spacing:1px;opacity:0.5;margin-bottom:2px}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.footer{position:fixed;bottom:0.5rem;right:1rem;font-size:0.65rem;color:rgba(232,232,240,0.15);z-index:1}
</style>
</head>
<body>
<div class="bg"><div class="bg-grid"></div><div class="bg-orb1"></div><div class="bg-orb2"></div></div>

<div class="container">
  <div class="logo">U</div>
  <div class="orb-wrap" id="orbWrap">
    <div class="pulse"></div><div class="pulse"></div><div class="pulse"></div>
    <div class="orb"></div>
  </div>
  <p class="title">Ultron Empire</p>
  <p class="subtitle">AI Wealth Analyst by <a href="https://www.pmssahihai.com" target="_blank">PMS Sahi Hai</a></p>
  <button class="call-btn" id="callBtn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
    </svg>
    <span id="btnText">CALL ULTRON</span>
  </button>
  <p class="status" id="status"></p>
</div>

<div class="captions" id="captions">
  <div class="captions-inner" id="captionsInner"></div>
</div>

<div class="footer">PMS Sahi Hai</div>

<script type="module">
const PUBLIC_KEY = 'd9c0293b-6b42-4315-9293-0ea16b1981e0';
const ASSISTANT_ID = 'c9a96928-b30a-4ca0-9fbb-928124b66cd7';

const orbWrap = document.getElementById('orbWrap');
const callBtn = document.getElementById('callBtn');
const btnText = document.getElementById('btnText');
const statusEl = document.getElementById('status');
const captions = document.getElementById('captions');
const captionsInner = document.getElementById('captionsInner');

let vapi = null;
let active = false;
let currentTranscript = null;

function addCaption(role, text) {
  if (!text || !text.trim()) return;
  const div = document.createElement('div');
  div.className = 'caption ' + role;
  const label = document.createElement('div');
  label.className = 'label';
  label.textContent = role === 'agent' ? 'Ultron' : 'You';
  div.appendChild(label);
  div.appendChild(document.createTextNode(text));
  captionsInner.appendChild(div);
  captions.scrollTop = captions.scrollHeight;
  // Keep only last 20 captions
  while (captionsInner.children.length > 20) {
    captionsInner.removeChild(captionsInner.firstChild);
  }
}

function updateLiveCaption(role, text) {
  if (!currentTranscript || currentTranscript.dataset.role !== role) {
    currentTranscript = document.createElement('div');
    currentTranscript.className = 'caption ' + role;
    currentTranscript.dataset.role = role;
    const label = document.createElement('div');
    label.className = 'label';
    label.textContent = role === 'agent' ? 'Ultron' : 'You';
    currentTranscript.appendChild(label);
    currentTranscript.appendChild(document.createTextNode(''));
    captionsInner.appendChild(currentTranscript);
  }
  currentTranscript.lastChild.textContent = text;
  captions.scrollTop = captions.scrollHeight;
}

callBtn.addEventListener('click', async () => {
  if (active && vapi) {
    vapi.stop();
    return;
  }

  if (!vapi) {
    statusEl.textContent = 'Loading...';
    statusEl.className = 'status live';
    try {
      const mod = await import('https://cdn.jsdelivr.net/npm/@vapi-ai/web@latest/+esm');
      let VapiClass = mod.default;
      if (VapiClass && VapiClass.default) VapiClass = VapiClass.default;
      if (typeof VapiClass !== 'function') {
        for (const key of Object.keys(mod)) {
          if (typeof mod[key] === 'function') { VapiClass = mod[key]; break; }
        }
      }
      vapi = new VapiClass(PUBLIC_KEY);

      vapi.on('call-start', () => {
        active = true;
        orbWrap.classList.add('active');
        callBtn.classList.add('active');
        btnText.textContent = 'END CALL';
        statusEl.textContent = 'Connected';
        statusEl.className = 'status live';
        captions.classList.add('show');
        captionsInner.innerHTML = '';
      });

      vapi.on('call-end', () => {
        active = false;
        orbWrap.classList.remove('active');
        callBtn.classList.remove('active');
        btnText.textContent = 'CALL ULTRON';
        statusEl.textContent = 'Call ended';
        statusEl.className = 'status';
        currentTranscript = null;
        setTimeout(() => {
          if (!active) { statusEl.textContent = ''; captions.classList.remove('show'); }
        }, 5000);
      });

      vapi.on('speech-start', () => {
        if (active) { statusEl.textContent = 'Ultron is speaking...'; }
      });

      vapi.on('speech-end', () => {
        if (active) { statusEl.textContent = 'Listening...'; currentTranscript = null; }
      });

      // Live transcription events
      vapi.on('transcript', (msg) => {
        if (msg.role === 'assistant' && msg.transcriptType === 'partial') {
          updateLiveCaption('agent', msg.transcript);
        } else if (msg.role === 'assistant' && msg.transcriptType === 'final') {
          currentTranscript = null;
          addCaption('agent', msg.transcript);
        } else if (msg.role === 'user' && msg.transcriptType === 'partial') {
          updateLiveCaption('user', msg.transcript);
        } else if (msg.role === 'user' && msg.transcriptType === 'final') {
          currentTranscript = null;
          addCaption('user', msg.transcript);
        }
      });

      // Fallback: message event for transcripts
      vapi.on('message', (msg) => {
        if (msg.type === 'transcript') {
          const role = msg.role === 'assistant' ? 'agent' : 'user';
          if (msg.transcriptType === 'final') {
            currentTranscript = null;
            addCaption(role, msg.transcript);
          } else {
            updateLiveCaption(role, msg.transcript);
          }
        }
      });

      vapi.on('error', (e) => {
        console.error('Vapi error:', e);
        statusEl.textContent = 'Error: ' + (e?.message || 'Connection failed');
        statusEl.className = 'status err';
        active = false;
        orbWrap.classList.remove('active');
        callBtn.classList.remove('active');
        btnText.textContent = 'CALL ULTRON';
      });
    } catch (e) {
      console.error('SDK load failed:', e);
      statusEl.textContent = 'Load failed: ' + e.message;
      statusEl.className = 'status err';
      return;
    }
  }

  statusEl.textContent = 'Connecting...';
  statusEl.className = 'status live';
  try {
    await vapi.start(ASSISTANT_ID);
  } catch (e) {
    console.error('Call start failed:', e);
    statusEl.textContent = (e?.message || 'Failed') + ' — allow microphone';
    statusEl.className = 'status err';
  }
});
</script>
</body>
</html>
